// ─── PERSISTENCE HOOK ─────────────────────────────────────────────────────────
function usePersist(key, initial) {
  const [value, setValue] = React.useState(() => {
    try { const s = localStorage.getItem(key); return s !== null ? JSON.parse(s) : initial; }
    catch(e) { return initial; }
  });
  React.useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch(e) {}
  }, [key, value]);
  return [value, setValue];
}

// ─── METHOD LOGO MARK ────────────────────────────────────────────────────────
// Exact logo: black rounded square, white plus cross, square notches at the
// 4 inner corners where the arms meet. Nothing more.
function MethodMark({ size = 40 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" rx="14" fill="#000000" />
      {/* Vertical arm */}
      <rect x="38" y="8" width="24" height="84" fill="white" />
      {/* Horizontal arm */}
      <rect x="8" y="38" width="84" height="24" fill="white" />
      {/* Square notch at each of the 4 inner corners */}
      <rect x="38" y="38" width="7" height="7" fill="#000000" />
      <rect x="55" y="38" width="7" height="7" fill="#000000" />
      <rect x="38" y="55" width="7" height="7" fill="#000000" />
      <rect x="55" y="55" width="7" height="7" fill="#000000" />
    </svg>
  );
}

// ─── COVER MARK — large centred logo ─────────────────────────────────────────
function Bullseye({ size = 180 }) {
  return <MethodMark size={size} />;
}

// ─── PATIENT / CLINICIAN STATE (editable inline) ─────────────────────────────
function EditableField({ value, onChange, placeholder, style }) {
  return (
    <input
      value={value}
      onChange={e => onChange(e.target.value)}
      placeholder={placeholder}
      style={{
        background: "transparent", border: "none", borderBottom: `1px solid ${C.borderDark}`,
        outline: "none", color: "inherit", fontSize: "inherit", fontWeight: "inherit",
        fontFamily: "inherit", textAlign: "inherit", width: "100%", ...style
      }}
    />
  );
}

}

);

// ─── EXERCISES TAB ────────────────────────────────────────────────────────────
function newExercise() {
  return { id: Date.now() + Math.random(), name: "", sets: "3", reps: "", weight: "", ytLink: "" };
}
function newSection(name = "") {
  return { id: Date.now() + Math.random(), label: name, open: true, exercises: [] };
}

const WEEK_LABELS = [
  { label: "Week 1", sub: "Foundation" },
  { label: "Week 2", sub: "Forefoot" },
  { label: "Week 3", sub: "Big Toe Load" },
  { label: "Week 4", sub: "Peak" },
];
const WEEK_ACCENT = ["#ffffff", "#aaaaaa", C.accentLight, C.accent];

function WeekView({ sections, setSectionsForWeek, notes, setNotes }) {
  const [newSectionName, setNewSectionName] = React.useState("");
  const [showLibrary, setShowLibrary] = React.useState(null); // sid when open
  const [libSearch, setLibSearch] = React.useState("");
  const [libCat, setLibCat] = React.useState("All");
  const [dragState, setDragState] = React.useState(null); // {sid, fromIdx}
  const [dragOver, setDragOver] = React.useState(null);   // {sid, toIdx}

  const inputBase = { background: C.surface, border: `1px solid ${C.border}`, borderRadius: 5, color: "#ffffff", fontWeight: 700, fontSize: 13, padding: "4px 6px", outline: "none", textAlign: "center" };

  function addSection() {
    const name = newSectionName.trim() || "New Section";
    setSectionsForWeek(prev => [...prev, newSection(name)]);
    setNewSectionName("");
  }
  function deleteSection(sid) { setSectionsForWeek(prev => prev.filter(s => s.id !== sid)); }
  function renameSection(sid, val) { setSectionsForWeek(prev => prev.map(s => s.id === sid ? { ...s, label: val } : s)); }
  function toggleSection(sid) { setSectionsForWeek(prev => prev.map(s => s.id === sid ? { ...s, open: !s.open } : s)); }

  function addExercise(sid) {
    setSectionsForWeek(prev => prev.map(s => s.id === sid ? { ...s, exercises: [...s.exercises, newExercise()] } : s));
  }
  function addFromLibrary(sid, ex) {
    const e = { ...newExercise(), name: ex.name, ytLink: ex.yt };
    setSectionsForWeek(prev => prev.map(s => s.id === sid ? { ...s, exercises: [...s.exercises, e] } : s));
  }
  function deleteExercise(sid, eid) {
    setSectionsForWeek(prev => prev.map(s => s.id === sid ? { ...s, exercises: s.exercises.filter(e => e.id !== eid) } : s));
  }
  function updateField(sid, eid, field, val) {
    setSectionsForWeek(prev => prev.map(s => s.id === sid ? { ...s, exercises: s.exercises.map(e => e.id === eid ? { ...e, [field]: val } : e) } : s));
  }

  // ── Drag & drop helpers ───────────────────────────────────────────────────
  function onDragStart(sid, idx) { setDragState({ sid, idx }); }
  function onDragEnter(sid, idx) { setDragOver({ sid, idx }); }
  function onDragEnd() {
    if (dragState && dragOver && dragState.sid === dragOver.sid && dragState.idx !== dragOver.idx) {
      setSectionsForWeek(prev => prev.map(s => {
        if (s.id !== dragState.sid) return s;
        const exs = [...s.exercises];
        const [moved] = exs.splice(dragState.idx, 1);
        exs.splice(dragOver.idx, 0, moved);
        return { ...s, exercises: exs };
      }));
    }
    setDragState(null);
    setDragOver(null);
  }

  // ── Library filter ────────────────────────────────────────────────────────
  const cats = ["All", ...Object.keys(EXERCISE_LIBRARY)];
  const filtered = ALL_EXERCISES.filter(e => {
    const catOk = libCat === "All" || e.cat === libCat;
    const searchOk = !libSearch || e.name.toLowerCase().includes(libSearch.toLowerCase());
    return catOk && searchOk;
  });

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>

      {/* Add section bar */}
      <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 4 }}>
        <input value={newSectionName} onChange={e => setNewSectionName(e.target.value)}
          onKeyDown={e => e.key === "Enter" && addSection()}
          placeholder="Add section (e.g. Neural Prep, Warm Up, Block A…)"
          style={{ flex: 1, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 7, color: "#ffffff", fontSize: 13, padding: "8px 14px", outline: "none" }} />
        <button onClick={addSection}
          style={{ background: C.accent, color: "#fff", border: "none", borderRadius: 7, padding: "8px 16px", fontSize: 12, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}>
          + Section
        </button>
      </div>

      {sections.length === 0 && (
        <div style={{ textAlign: "center", padding: "40px 0", color: C.muted, fontSize: 13 }}>
          No sections yet — add one above to get started.
        </div>
      )}

      {sections.map(section => (
        <div key={section.id} style={{ border: `1px solid ${C.border}`, borderRadius: 10, overflow: "hidden" }}>

          {/* Section header */}
          <div style={{ display: "flex", alignItems: "center", background: section.open ? C.surface : C.card }}>
            <div onClick={() => toggleSection(section.id)}
              style={{ flex: 1, display: "flex", alignItems: "center", gap: 10, padding: "11px 16px", cursor: "pointer", userSelect: "none" }}>
              <div style={{ width: 3, height: 16, background: C.accent, borderRadius: 2, flexShrink: 0 }} />
              <input value={section.label} onChange={e => { e.stopPropagation(); renameSection(section.id, e.target.value); }}
                onClick={e => e.stopPropagation()}
                style={{ background: "transparent", border: "none", outline: "none", color: C.heading, fontWeight: 800, fontSize: 13, letterSpacing: "0.05em", textTransform: "uppercase", minWidth: 80 }} />
              <span style={{ fontSize: 11, color: C.muted }}>({section.exercises.length})</span>
            </div>
            <span onClick={() => toggleSection(section.id)}
              style={{ color: C.muted, fontSize: 16, padding: "11px 8px", cursor: "pointer", display: "inline-block", transform: section.open ? "rotate(180deg)" : "rotate(0deg)" }}>▾</span>
            <button onClick={() => deleteSection(section.id)}
              style={{ background: "transparent", border: "none", color: C.red, fontSize: 16, padding: "11px 14px", cursor: "pointer", fontWeight: 700 }}>×</button>
          </div>

          {/* Section body */}
          {section.open && (
            <div style={{ padding: "12px 14px", background: C.bg }}>

              {/* Exercise rows */}
              {section.exercises.length > 0 && (
                <div style={{ display: "flex", flexDirection: "column", gap: 5, marginBottom: 10 }}>
                  {section.exercises.map((ex, idx) => {
                    const isDragging = dragState && dragState.sid === section.id && dragState.idx === idx;
                    const isOver = dragOver && dragOver.sid === section.id && dragOver.idx === idx;
                    return (
                      <div key={ex.id}
                        draggable
                        onDragStart={() => onDragStart(section.id, idx)}
                        onDragEnter={() => onDragEnter(section.id, idx)}
                        onDragEnd={onDragEnd}
                        onDragOver={e => e.preventDefault()}
                        style={{
                          display: "flex", alignItems: "center", gap: 6,
                          background: isOver ? C.surface : C.card,
                          border: `1px solid ${isOver ? C.accent : C.border}`,
                          borderLeft: `3px solid ${C.accent}`,
                          borderRadius: 8, padding: "7px 8px",
                          opacity: isDragging ? 0.4 : 1,
                          transition: "all 0.1s",
                          cursor: "grab",
                        }}>
                        {/* Drag handle */}
                        <span style={{ color: C.muted, fontSize: 14, flexShrink: 0, cursor: "grab", padding: "0 2px", userSelect: "none" }}>⠿</span>

                        {/* Name */}
                        <input value={ex.name} onChange={e => updateField(section.id, ex.id, "name", e.target.value)}
                          placeholder="Exercise name"
                          style={{ flex: 2, minWidth: 80, background: "transparent", border: "none", borderBottom: `1px solid ${C.border}`, borderRadius: 0, color: "#fff", fontWeight: 600, fontSize: 13, padding: "2px 4px", outline: "none" }} />

                        {/* Sets */}
                        <input value={ex.sets} onChange={e => updateField(section.id, ex.id, "sets", e.target.value)}
                          placeholder="Sets" style={{ ...inputBase, width: 36, fontSize: 12 }} />

                        {/* Reps */}
                        <input value={ex.reps} onChange={e => updateField(section.id, ex.id, "reps", e.target.value)}
                          placeholder="Reps" style={{ ...inputBase, width: 52, fontSize: 12 }} />

                        {/* Load */}
                        <input value={ex.weight} onChange={e => updateField(section.id, ex.id, "weight", e.target.value)}
                          placeholder="Load" style={{ ...inputBase, width: 52, fontSize: 12, color: C.accent }} />

                        {/* YouTube */}
                        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2, flexShrink: 0 }}>
                          {ex.ytLink
                            ? <a href={ex.ytLink} target="_blank" rel="noopener noreferrer"
                                style={{ background: "#cc0000", color: "#fff", borderRadius: 4, padding: "2px 7px", fontSize: 10, fontWeight: 700, textDecoration: "none" }}>▶</a>
                            : <input value={ex.ytLink} onChange={e => updateField(section.id, ex.id, "ytLink", e.target.value)}
                                placeholder="YT URL" style={{ ...inputBase, width: 52, fontSize: 9, color: C.muted }} />
                          }
                          {ex.ytLink && (
                            <input value={ex.ytLink} onChange={e => updateField(section.id, ex.id, "ytLink", e.target.value)}
                              placeholder="YT URL" style={{ ...inputBase, width: 52, fontSize: 8, color: C.muted }} />
                          )}
                        </div>

                        {/* Delete */}
                        <button onClick={() => deleteExercise(section.id, ex.id)}
                          style={{ background: "transparent", border: `1px solid ${C.red}`, color: C.red, borderRadius: 4, width: 22, height: 22, cursor: "pointer", fontSize: 12, lineHeight: 1, flexShrink: 0 }}>×</button>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* Column labels */}
              {section.exercises.length > 0 && (
                <div style={{ display:"flex", gap:6, padding:"0 36px 4px 36px", fontSize:9, color:C.muted, letterSpacing:"0.08em", textTransform:"uppercase" }}>
                  <span style={{flex:2}}>Exercise</span>
                  <span style={{width:36,textAlign:"center"}}>Sets</span>
                  <span style={{width:52,textAlign:"center"}}>Reps</span>
                  <span style={{width:52,textAlign:"center"}}>Load</span>
                  <span style={{width:52,textAlign:"center"}}>YT</span>
                  <span style={{width:22}}/>
                </div>
              )}

              {/* Add buttons */}
              <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                <button onClick={() => addExercise(section.id)}
                  style={{ background: C.accent, color: "#fff", border: "none", borderRadius: 6, padding: "6px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                  + Custom
                </button>
                <button onClick={() => { setShowLibrary(section.id); setLibSearch(""); setLibCat("All"); }}
                  style={{ background: C.surface, color: C.heading, border: `1px solid ${C.border}`, borderRadius: 6, padding: "6px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                  📚 Library
                </button>
              </div>
            </div>
          )}
        </div>
      ))}

      {/* Week notes */}
      <Card style={{ marginTop: 8 }}>
        <SectionTitle>Week Notes</SectionTitle>
        <textarea value={notes} onChange={e => setNotes(e.target.value)}
          placeholder="Notes for this week..."
          style={{ width: "100%", background: "transparent", border: "none", color: C.text, fontSize: 13, resize: "vertical", outline: "none", minHeight: 60 }} />
      </Card>

      {/* ── Library modal ──────────────────────────────────────────────────── */}
      {showLibrary && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 50, display: "flex", alignItems: "flex-end" }}
          onClick={() => setShowLibrary(null)}>
          <div onClick={e => e.stopPropagation()}
            style={{ width: "100%", maxHeight: "85vh", background: C.surface, borderRadius: "16px 16px 0 0", display: "flex", flexDirection: "column", overflow: "hidden" }}>

            {/* Modal header */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 18px 12px", borderBottom: `1px solid ${C.border}` }}>
              <span style={{ fontWeight: 800, fontSize: 15, color: C.heading }}>📚 Exercise Library</span>
              <button onClick={() => setShowLibrary(null)}
                style={{ background: "transparent", border: "none", color: C.muted, fontSize: 20, cursor: "pointer", lineHeight: 1 }}>×</button>
            </div>

            {/* Search */}
            <div style={{ padding: "10px 14px 6px" }}>
              <input value={libSearch} onChange={e => setLibSearch(e.target.value)}
                placeholder="Search exercises…"
                style={{ width: "100%", background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, color: "#fff", fontSize: 14, padding: "9px 14px", outline: "none" }} />
            </div>

            {/* Category chips */}
            <div style={{ display: "flex", gap: 6, overflowX: "auto", padding: "6px 14px 10px", scrollbarWidth: "none" }}>
              {cats.map(cat => (
                <button key={cat} onClick={() => setLibCat(cat)}
                  style={{ background: libCat === cat ? C.accent : C.card, color: libCat === cat ? "#fff" : C.muted, border: `1px solid ${libCat === cat ? C.accent : C.border}`, borderRadius: 20, padding: "4px 12px", fontSize: 11, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}>
                  {cat}
                </button>
              ))}
            </div>

            {/* Exercise list */}
            <div style={{ flex: 1, overflowY: "auto", padding: "0 14px 20px" }}>
              {filtered.length === 0 && (
                <div style={{ textAlign: "center", padding: "24px 0", color: C.muted, fontSize: 13 }}>No exercises found</div>
              )}
              {filtered.map((ex, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 0", borderBottom: `1px solid ${C.border}` }}>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: C.heading }}>{ex.name}</div>
                    <div style={{ fontSize: 10, color: C.muted, marginTop: 2 }}>{ex.cat}</div>
                  </div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <a href={ex.yt} target="_blank" rel="noopener noreferrer"
                      style={{ background: "#cc0000", color: "#fff", borderRadius: 4, padding: "3px 8px", fontSize: 10, fontWeight: 700, textDecoration: "none" }}>▶ YT</a>
                    <button onClick={() => { addFromLibrary(showLibrary, ex); }}
                      style={{ background: C.accent, color: "#fff", border: "none", borderRadius: 5, padding: "5px 12px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>
                      + Add
                    </button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}



function ExercisesTab({ weeks, setWeeks, notes, setNotes }) {
  const [activeWeek, setActiveWeek] = React.useState(0);

  function setSectionsForWeek(wi, updater) {
    setWeeks(prev => prev.map((w, i) => i === wi ? { ...w, sections: typeof updater === "function" ? updater(w.sections) : updater } : w));
  }
  function setNotesForWeek(wi, val) {
    setWeeks(prev => prev.map((w, i) => i === wi ? { ...w, notes: val } : w));
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>

function pct(a, b) {
  if (!a || !b) return null;
  return (((b - a) / a) * 100).toFixed(1);
}
function asymmetry(l, r) {
  if (!l || !r) return null;
  const hi = Math.max(l, r), lo = Math.min(l, r);
  return (((hi - lo) / hi) * 100).toFixed(1);
}

function MiniChart({ data, color = C.accent }) {
  if (!data || data.length < 2) return (
    <div style={{ height: 64, display: "flex", alignItems: "center", justifyContent: "center", color: C.mutedLight, fontSize: 11 }}>
      Add ≥2 entries to see graph
    </div>
  );
  const vals = data.map(d => Number(d.value)).filter(Boolean);
  const min = Math.min(...vals) * 0.93;
  const max = Math.max(...vals) * 1.07;
  const W = 200, H = 60;
  const xStep = W / (vals.length - 1);
  const yScale = v => H - ((v - min) / (max - min || 1)) * H;
  const pts = vals.map((v, i) => `${i * xStep},${yScale(v)}`).join(" ");
  return (
    <svg width={W} height={H} style={{ overflow: "visible" }}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round" />
      {vals.map((v, i) => (
        <circle key={i} cx={i * xStep} cy={yScale(v)} r={3.5} fill={color} stroke="white" strokeWidth={1} />
      ))}
    </svg>
  );
}

function TestingTab({ bodyweight, setBodyweight, bwHistory, setBwHistory, rows, setRows }) {
  // newEntry: { testKey_measureKey: { date, l, r, value } }
  const [newEntry, setNewEntry] = React.useState(() => {
    const e = {};
    testTypes.forEach(t => t.measures.forEach(m => { e[t.key+"_"+m.key] = { date:"", l:"", r:"", value:"" }; }));
    return e;
  });
  const [bwInput, setBwInput] = React.useState(bodyweight || "");
  const [bwDate, setBwDate] = React.useState("");
  const [editingBw, setEditingBw] = React.useState(null);
  const [editingRow, setEditingRow] = React.useState(null);

  function addBwEntry() {
    if (!bwDate || !bwInput) return;
    const val = Number(bwInput);
    setBwHistory(prev => [...prev, { date: bwDate, value: val }]);
    setBodyweight(val);
    setBwInput("");
    setBwDate("");
  }
  function deleteBwEntry(i) {
    setBwHistory(prev => {
      const next = prev.filter((_, idx) => idx !== i);
      if (next.length) setBodyweight(next[next.length - 1].value);
      else setBodyweight(null);
      return next;
    });
  }
  function saveBwEdit(i) {
    if (!editingBw) return;
    setBwHistory(prev => prev.map((r, idx) => idx === i ? { ...r, [editingBw.field]: editingBw.field === "value" ? Number(editingBw.value) : editingBw.value } : r));
    setBodyweight(bwHistory.map((r, idx) => idx === i ? Number(editingBw.value) : r.value).slice(-1)[0] || bodyweight);
    setEditingBw(null);
  }

  function addEntry(compositeKey, bilateral) {
    const e = newEntry[compositeKey] || { date:"", l:"", r:"", value:"" };
    if (!e.date) return;
    const entry = bilateral ? { date: e.date, l: Number(e.l), r: Number(e.r) } : { date: e.date, value: Number(e.value) };
    setRows(prev => ({ ...prev, [compositeKey]: [...(prev[compositeKey]||[]), entry] }));
    setNewEntry(prev => ({ ...prev, [compositeKey]: { date: "", l: "", r: "", value: "" } }));
  }
  function updateNew(compositeKey, field, val) {
    setNewEntry(prev => ({
      ...prev,
      [compositeKey]: { ...(prev[compositeKey] || { date:"", l:"", r:"", value:"" }), [field]: val }
    }));
  }
  function deleteRow(key, i) {
    setRows(prev => ({ ...prev, [key]: (prev[key]||[]).filter((_, idx) => idx !== i) }));
  }
  function saveRowEdit(key, i) {
    if (!editingRow) return;
    setRows(prev => ({
      ...prev,
      [key]: (prev[key]||[]).map((r, idx) => {
        if (idx !== i) return r;
        const updated = { ...r };
        const isNum = ["l","r","value"].includes(editingRow.field);
        updated[editingRow.field] = isNum ? Number(editingRow.value) : editingRow.value;
        return updated;
      })
    }));
    setEditingRow(null);
  }

  const inputStyle = { background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, color: C.text, padding: "5px 8px", fontSize: 12, outline: "none" };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>

      {/* ── Bodyweight Card ── */}
      <Card style={{ borderLeft: `3px solid ${C.accent}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 16 }}>
          <div style={{ flex: 1, minWidth: 240 }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: C.heading, marginBottom: 2 }}>Body Weight</div>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 14 }}>
              Unit: kg — used to auto-calculate relative scores in Tab 3
            </div>

            {/* Current BW display */}
            {bodyweight && (
              <div style={{ display: "inline-flex", alignItems: "baseline", gap: 6, marginBottom: 14, background: C.surface, borderRadius: 8, padding: "8px 16px", border: `1px solid ${C.border}` }}>
                <span style={{ fontSize: 28, fontWeight: 900, color: C.heading }}>{bodyweight}</span>
                <span style={{ fontSize: 13, color: C.muted }}>kg</span>
              </div>
            )}

            {/* History table */}
            {bwHistory.length > 0 && (
              <table style={{ width: "100%", fontSize: 12, borderCollapse: "collapse", marginBottom: 12 }}>
                <thead>
                  <tr style={{ borderBottom: `1px solid ${C.border}` }}>
                    <th style={{ textAlign: "left", padding: "4px 8px", color: C.muted, fontWeight: 600 }}>Date</th>
                    <th style={{ textAlign: "center", color: C.muted, fontWeight: 600 }}>Weight (kg)</th>
                    <th style={{ textAlign: "center", color: C.accent, fontWeight: 700 }}>Δ%</th>
                    <th style={{ width: 60 }} />
                  </tr>
                </thead>
                <tbody>
                  {bwHistory.map((row, i) => {
                    const prev = bwHistory[i - 1];
                    const delta = prev ? pct(prev.value, row.value) : null;
                    const editingThis = editingBw && editingBw.index === i;
                    return (
                      <tr key={i} style={{ borderBottom: `1px solid ${C.border}`, background: editingThis ? C.surface : "transparent" }}>
                        <td style={{ padding: "4px 8px" }}>
                          {editingThis && editingBw.field === "date"
                            ? <input type="date" value={editingBw.value} onChange={e => setEditingBw(p => ({...p, value: e.target.value}))} onBlur={() => saveBwEdit(i)} autoFocus style={{ background: C.card, border: `1px solid ${C.accent}`, borderRadius: 4, color: C.text, padding: "2px 6px", fontSize: 12, outline: "none" }} />
                            : <span onClick={() => setEditingBw({ index: i, field: "date", value: row.date })} style={{ color: C.text, cursor: "pointer", borderBottom: `1px dashed ${C.border}` }}>{row.date}</span>}
                        </td>
                        <td style={{ textAlign: "center" }}>
                          {editingThis && editingBw.field === "value"
                            ? <input type="number" value={editingBw.value} onChange={e => setEditingBw(p => ({...p, value: e.target.value}))} onBlur={() => saveBwEdit(i)} autoFocus style={{ width: 60, background: C.card, border: `1px solid ${C.accent}`, borderRadius: 4, color: C.heading, padding: "2px 6px", fontSize: 12, outline: "none", textAlign: "center" }} />
                            : <span onClick={() => setEditingBw({ index: i, field: "value", value: row.value })} style={{ color: C.heading, fontWeight: 700, cursor: "pointer", borderBottom: `1px dashed ${C.border}` }}>{row.value} kg</span>}
                        </td>
                        <td style={{ textAlign: "center", fontWeight: 700, color: delta && Number(delta) >= 0 ? C.accent : C.red }}>
                          {delta ? `${Number(delta) >= 0 ? "+" : ""}${delta}%` : "—"}
                        </td>
                        <td style={{ textAlign: "center" }}>
                          <button onClick={() => deleteBwEntry(i)} style={{ background: "transparent", border: `1px solid ${C.red}`, color: C.red, borderRadius: 4, width: 22, height: 22, cursor: "pointer", fontSize: 12, lineHeight: 1 }}>×</button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            )}

            {/* Add entry */}
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
              <input type="date" value={bwDate} onChange={e => setBwDate(e.target.value)} style={inputStyle} />
              <input type="number" placeholder="kg" value={bwInput} onChange={e => setBwInput(e.target.value)}
                style={{ ...inputStyle, width: 70 }} />
              <button onClick={addBwEntry}
                style={{ background: C.accent, color: "#fff", border: "none", borderRadius: 6, padding: "5px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                + Add
              </button>
            </div>
          </div>

          <div style={{ minWidth: 220, paddingLeft: 8 }}>
            <div style={{ fontSize: 10, color: C.muted, marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.1em" }}>Progression</div>
            <MiniChart data={bwHistory} color={C.accent} />
          </div>
        </div>
      </Card>

      {testTypes.map(t => (
        <Card key={t.key} style={{ borderLeft: `3px solid ${C.accent}`, marginBottom: 0 }}>
          <div style={{ fontSize: 14, fontWeight: 800, color: C.heading, marginBottom: 14 }}>{t.label}</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            {t.measures.map(m => {
              const cKey = t.key + "_" + m.key;
              const data = (rows && rows[cKey]) || [];
              const ne = newEntry[cKey] || { date:"", l:"", r:"", value:"" };
              const chartData = m.bilateral
                ? data.map(d => ({ date: d.date, value: ((d.l||0)+(d.r||0))/2 }))
                : data;

              return (
                <div key={m.key} style={{ background: C.surface, borderRadius: 8, padding: "12px 12px" }}>
                  {/* Measure header + mini chart */}
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom: 10, gap: 8, flexWrap: "wrap" }}>
                    <div>
                      <span style={{ fontSize: 13, fontWeight: 700, color: C.heading }}>{m.label}</span>
                      {m.unit ? <span style={{ fontSize: 11, color: C.muted, marginLeft: 6 }}>{m.unit}</span> : null}
                    </div>
                    <MiniChart data={chartData} color={C.accent} />
                  </div>

                  {/* History table */}
                  {data.length > 0 && (
                    <div style={{ overflowX: "auto", marginBottom: 10 }}>
                      <table style={{ width: "100%", fontSize: 12, borderCollapse: "collapse" }}>
                        <thead>
                          <tr style={{ borderBottom: `1px solid ${C.border}` }}>
                            <th style={{ textAlign:"left", padding:"3px 6px", color:C.muted, fontWeight:600 }}>Date</th>
                            {m.bilateral ? <>
                              <th style={{ textAlign:"center", color:C.muted, fontWeight:600, padding:"3px 6px" }}>L</th>
                              <th style={{ textAlign:"center", color:C.muted, fontWeight:600, padding:"3px 6px" }}>R</th>
                              <th style={{ textAlign:"center", color:C.yellow, fontWeight:700, padding:"3px 6px" }}>Asym%</th>
                            </> : <th style={{ textAlign:"center", color:C.muted, fontWeight:600, padding:"3px 6px" }}>Value</th>}
                            <th style={{ textAlign:"center", color:C.accent, fontWeight:700, padding:"3px 6px" }}>Δ%</th>
                            <th style={{ width:28 }} />
                          </tr>
                        </thead>
                        <tbody>
                          {data.map((row, i) => {
                            const prev = data[i-1];
                            let delta = null;
                            if (m.bilateral && prev) delta = pct((prev.l+prev.r)/2, (row.l+row.r)/2);
                            if (!m.bilateral && prev) delta = pct(prev.value, row.value);
                            const asym = m.bilateral ? asymmetry(row.l, row.r) : null;
                            const asymNum = Number(asym);
                            const isEditing = editingRow && editingRow.key===cKey && editingRow.index===i;
                            const cellInput = (field, type="text") => (
                              <input type={type} value={editingRow.value}
                                onChange={e => setEditingRow(p=>({...p,value:e.target.value}))}
                                onBlur={() => saveRowEdit(cKey, i)} autoFocus
                                style={{ width:type==="date"?100:52, background:C.card, border:`1px solid ${C.accent}`, borderRadius:4, color:C.heading, padding:"2px 4px", fontSize:11, outline:"none", textAlign:"center" }} />
                            );
                            const cell = (val, field) => isEditing && editingRow.field===field
                              ? cellInput(field, ["l","r","value"].includes(field)?"number":"date")
                              : <span onClick={() => setEditingRow({key:cKey,index:i,field,value:String(val)})}
                                  style={{ cursor:"pointer", borderBottom:`1px dashed ${C.border}`, color:C.text }}>{val}</span>;
                            return (
                              <tr key={i} style={{ borderBottom:`1px solid ${C.border}`, background: isEditing ? C.card : "transparent" }}>
                                <td style={{ padding:"4px 6px" }}>{cell(row.date,"date")}</td>
                                {m.bilateral ? <>
                                  <td style={{ textAlign:"center", padding:"4px 4px" }}>{cell(row.l,"l")}</td>
                                  <td style={{ textAlign:"center", padding:"4px 4px" }}>{cell(row.r,"r")}</td>
                                  <td style={{ textAlign:"center", fontWeight:700, padding:"4px 4px",
                                    color: asymNum>15?C.red:asymNum>10?C.yellow:C.accent }}>
                                    {asym ? `${asym}%` : "—"}
                                  </td>
                                </> : <td style={{ textAlign:"center", padding:"4px 4px" }}>{cell(row.value,"value")}</td>}
                                <td style={{ textAlign:"center", fontWeight:700, padding:"4px 4px",
                                  color: delta&&Number(delta)>=0?C.accent:C.red }}>
                                  {delta ? `${Number(delta)>=0?"+":""}${delta}%` : "—"}
                                </td>
                                <td style={{ textAlign:"center" }}>
                                  <button onClick={() => deleteRow(cKey, i)}
                                    style={{ background:"transparent", border:`1px solid ${C.red}`, color:C.red, borderRadius:4, width:22, height:22, cursor:"pointer", fontSize:12, lineHeight:1 }}>×</button>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  )}

                  {/* Add entry row */}
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
                    <input type="date" value={ne.date}
                      onChange={e => updateNew(cKey,"date",e.target.value)}
                      style={inputStyle} />
                    {m.bilateral ? <>
                      <input type="number" placeholder="L" value={ne.l}
                        onChange={e => updateNew(cKey,"l",e.target.value)}
                        style={{ ...inputStyle, width:58 }} />
                      <input type="number" placeholder="R" value={ne.r}
                        onChange={e => updateNew(cKey,"r",e.target.value)}
                        style={{ ...inputStyle, width:58 }} />
                    </> : (
                      <input type="number" placeholder="Value" value={ne.value}
                        onChange={e => updateNew(cKey,"value",e.target.value)}
                        style={{ ...inputStyle, width:80 }} />
                    )}
                    <button onClick={() => addEntry(cKey, m.bilateral)}
                      style={{ background:C.accent, color:"#fff", border:"none", borderRadius:6, padding:"5px 14px", fontSize:12, fontWeight:700, cursor:"pointer" }}>
                      + Add
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      ))}
    </div>
  );
}

function classifyBand(item, rawValue, bw) {
  if (item.asymmetryBased) return null; // manual only
  if (!rawValue && rawValue !== 0) return null;
  const v = Number(rawValue);
  if (!item.breaks) return null;
  const score = item.bwRelative && bw ? v / bw : v;
  if (item.invertScale) {
    if (score < item.breaks[0]) return 0; // Elite
    if (score < item.breaks[1]) return 1; // Very Good
    if (score < item.breaks[2]) return 2; // Good
    return 3; // Poor
  }
  if (score < item.breaks[0]) return 0;
  if (score < item.breaks[1]) return 1;
  if (score < item.breaks[2]) return 2;
  return 3;
}

function NormativeTab({ bodyweight, testRows }) {
  const [manualSelected, setManualSelected] = React.useState(() => normativeData.reduce((a, item) => { a[item.label] = null; return a; }, {}));

  // Get latest value for each test to auto-classify
  function getLatestValue(item) {
    const key = item.testKey; // composite key like "imtp_peak_force"
    const data = (testRows && testRows[key]) || [];
    if (!data.length) return null;
    const last = data[data.length - 1];
    return last.value !== undefined ? last.value
      : (last.l && last.r ? (last.l + last.r) / 2 : (last.l || last.r));
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 22 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10, marginBottom: 4 }}>
        <div style={{ fontSize: 13, color: C.muted }}>
          Bands auto-highlight from testing data. Click any band to override manually.
        </div>
        {bodyweight ? (
          <div style={{ fontSize: 12, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 7, padding: "5px 14px", color: C.heading }}>
            BW: <strong>{bodyweight} kg</strong>
          </div>
        ) : (
          <div style={{ fontSize: 12, color: C.red }}>⚠ Enter bodyweight in Tab 2 for relative scores</div>
        )}
      </div>

      {normativeData.map((item, i) => {
        const latestVal = getLatestValue(item);
        const autoBand = classifyBand(item, latestVal, bodyweight);
        const activeBand = manualSelected[item.label] !== null ? manualSelected[item.label] : autoBand;

        return (
          <Card key={i}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 700, color: C.heading }}>{item.label}</div>
                <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>{item.unit}</div>
                {item.why && <div style={{ fontSize: 11, color: C.accentLight, marginTop: 3, fontStyle: "italic" }}>Why: {item.why}</div>}
              </div>
              {latestVal && (
                <div style={{ fontSize: 12, color: C.muted, background: C.surface, borderRadius: 6, padding: "4px 10px", border: `1px solid ${C.border}` }}>
                  Latest: <span style={{ color: C.heading, fontWeight: 700 }}>{Number(latestVal).toFixed(1)}</span>
                  {false && (
                    <span style={{ color: C.accent, marginLeft: 6, fontWeight: 700 }}>→ {(Number(latestVal)/bodyweight).toFixed(2)} relative</span>
                  )}
                </div>
              )}
            </div>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              {item.bands.map((b, j) => {
                const isActive = activeBand === j;
                const isAuto = autoBand === j && manualSelected[item.label] === null;
                return (
                  <div key={j}
                    onClick={() => setManualSelected(prev => ({ ...prev, [item.label]: prev[item.label] === j ? null : j }))}
                    style={{
                      flex: "1 1 110px", background: b.bg,
                      border: `1px solid ${b.border}`,
                      borderTop: `3px solid ${b.border}`,
                      borderRadius: 8, padding: "12px 14px",
                      cursor: "pointer",
                      boxShadow: isActive ? `0 0 0 2px ${b.border}` : "none",
                      transition: "box-shadow 0.15s",
                      position: "relative"
                    }}>
                    {isAuto && <div style={{ position: "absolute", top: 6, right: 6, fontSize: 8, color: b.text, fontWeight: 800, letterSpacing: "0.08em" }}>AUTO</div>}
                    <div style={{ fontSize: 10, fontWeight: 800, color: b.text, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 5 }}>{b.tier}</div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: C.heading }}>{b.range}</div>
                    <div style={{ marginTop: 10, textAlign: "center", height: 20 }}>
                      {isActive && (
                        <div style={{ display: "inline-block" }}>
                          <div style={{ width: 0, height: 0, borderLeft: "7px solid transparent", borderRight: "7px solid transparent", borderBottom: `10px solid ${b.border}`, margin: "0 auto" }} />
                          <div style={{ fontSize: 9, color: b.text, fontWeight: 800, marginTop: 2, letterSpacing: "0.08em" }}>{isAuto ? "CURRENT" : "MARKED"}</div>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{ fontSize: 10, color: C.muted, marginTop: 10, fontStyle: "italic" }}>Ref: {item.ref}</div>
          </Card>
        );
      })}
    </div>
  );
}

                color: isActive ? C.accent : C.muted,
                padding: "10px 4px 8px", cursor: "pointer",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 3
              }}>
              <div style={{ fontSize: 18 }}>{t.icon}</div>
              <div style={{ fontSize: 9, fontWeight: isActive ? 800 : 500, letterSpacing: "0.04em", textTransform: "uppercase" }}>{t.short}</div>
              {isActive && <div style={{ width: 18, height: 2, background: C.accent, borderRadius: 1 }} />}
            </button>
          );
        })}
      </div>
    </div>
  );
}

    const domNode = document.getElementById("root");
    const appRoot = ReactDOM.createRoot(domNode);
    appRoot.render(React.createElement(App));
    const loader = document.getElementById("loader");
    if(loader) loader.style.display="none";
  </script>
</body>
</html>
